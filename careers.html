<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kenflix Careers | Vault Vacancies</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background: #0f172a; color: #f8fafc; }
        .job-card { 
            background: rgba(30, 41, 59, 0.4); 
            border: 1px solid rgba(255,255,255,0.05); 
            border-radius: 2.5rem; 
            transition: all 0.3s ease;
        }
        .job-card:hover { 
            border-color: #f97316; 
            transform: translateY(-5px);
            background: rgba(30, 41, 59, 0.6);
        }
        .text-brand-orange { color: #f97316; }
        .hidden { display: none; }
        
        /* Custom scrollbar for better aesthetics */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #f97316; }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <nav class="p-6 border-b border-white/5 bg-slate-900/50 backdrop-blur-md sticky top-0 z-50">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-sky-400 font-black uppercase tracking-widest text-sm italic">Kenflix Portals</h1>
            <a href="index.html" class="text-[10px] font-bold text-gray-500 uppercase tracking-widest hover:text-white transition">← Main Site</a>
        </div>
    </nav>

    <main class="container mx-auto px-6 py-16">
        <header class="mb-20">
            <span class="text-sky-400 font-black text-[10px] uppercase tracking-[0.4em] block mb-4">Live Database</span>
            <h1 class="text-6xl md:text-8xl font-black text-white leading-tight uppercase tracking-tighter">
                Careers <span class="text-brand-orange">Vault</span>
            </h1>
        </header>

        <div id="status-area" class="flex items-center gap-3 text-gray-500 uppercase tracking-widest text-[10px] font-bold italic mb-10">
            <div id="loader" class="animate-spin rounded-full h-4 w-4 border-2 border-brand-orange border-t-transparent"></div>
            <span id="status-text">Connecting to Kenflix Cloud...</span>
        </div>

        <div id="jobGrid" class="grid grid-cols-1 md:grid-cols-2 gap-10">
            </div>
    </main>

    <script>
        // Replace this with your newly deployed Google Apps Script Web App URL
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxifvk82I76Vt_fLPaDQgdjKPMqNYENi4JP3clerubLRf-qfwy43LAmTGqwNbm4-vFH/exec";
        const CACHE_KEY = 'kenflix_vault_cache';

        async function loadJobs() {
            const grid = document.getElementById('jobGrid');
            const statusText = document.getElementById('status-text');
            const loader = document.getElementById('loader');

            // 1. Show cached data immediately for offline/fast viewing
            const cachedData = localStorage.getItem(CACHE_KEY);
            if (cachedData) {
                renderJobs(JSON.parse(cachedData));
                statusText.innerText = "System Online: Viewing Cached Data";
            }

            try {
                // 2. Fetch fresh data from Google Sheets
                const response = await fetch(SCRIPT_URL);
                if (!response.ok) throw new Error('Network response was not ok');
                
                const jobs = await response.json();

                // 3. Update Cache & UI
                localStorage.setItem(CACHE_KEY, JSON.stringify(jobs));
                loader.classList.add('hidden');
                statusText.innerText = `Live System Online: ${jobs.length} Active Roles`;
                renderJobs(jobs);

            } catch (error) {
                console.error("Fetch Error:", error);
                loader.classList.add('hidden');
                
                if (cachedData) {
                    statusText.innerText = "Offline Mode: Showing Last Known Vacancies";
                } else {
                    statusText.innerText = "Connection Error. Please check your internet.";
                    grid.innerHTML = `<p class="text-gray-500 uppercase text-xs font-bold tracking-widest">No data available to display.</p>`;
                }
            }
        }

        function renderJobs(jobs) {
            const grid = document.getElementById('jobGrid');
            if (!jobs || jobs.length === 0) return;

            grid.innerHTML = jobs.map(job => `
                <div class="job-card p-10 flex flex-col h-full">
                    <div class="flex justify-between items-start mb-8">
                        <span class="text-[10px] font-black text-sky-400 uppercase tracking-[0.2em] italic">${job.jobid || 'ID-PENDING'}</span>
                        <span class="text-[9px] text-gray-600 font-bold uppercase tracking-widest">
                            Post Date: ${job.timeweposted ? new Date(job.timeweposted).toLocaleDateString() : 'Recent'}
                        </span>
                    </div>

                    <h2 class="text-4xl font-black text-white mb-6 uppercase tracking-tighter leading-none">${job.jobtitle}</h2>

                    <div class="grid grid-cols-2 gap-4 mb-8">
                        <div class="bg-white/5 p-4 rounded-2xl border border-white/5">
                            <p class="text-[8px] text-gray-500 uppercase font-black mb-1">Region</p>
                            <p class="text-xs font-bold text-white uppercase tracking-wider">${job.location || 'Remote'}</p>
                        </div>
                        <div class="bg-white/5 p-4 rounded-2xl border border-white/5">
                            <p class="text-[8px] text-gray-500 uppercase font-black mb-1">Package</p>
                            <p class="text-xs font-bold text-brand-orange uppercase tracking-wider">${job.salary || 'Negotiable'}</p>
                        </div>
                    </div>

                    <p class="text-gray-400 text-sm leading-relaxed mb-10 line-clamp-4">${job.description}</p>

                    <div class="mt-auto pt-6 border-t border-white/5 space-y-4">
                        <div class="flex justify-between items-center">
                            <span class="text-[9px] text-gray-500 uppercase font-black">Deadline</span>
                            <span class="text-[10px] text-brand-orange font-black uppercase">${job.datedposted || 'Urgent'}</span>
                        </div>
                        <a href="${job.link || '#'}" target="_blank" class="inline-block bg-white text-black px-10 py-4 rounded-2xl text-[10px] font-black uppercase tracking-[0.2em] hover:bg-brand-orange hover:text-white transition-all w-full text-center">
                            Apply for this Role
                        </a>
                    </div>
                </div>
            `).join('');
            
            // Re-initialize icons if any were added
            if (typeof lucide !== 'undefined') {
                lucide.createIcons();
            }
        }

        // Initialize on load
        window.onload = loadJobs;
    </script>
</body>
</html>
