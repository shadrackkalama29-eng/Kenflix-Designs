<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kenflix Careers</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-[#0f172a] text-white min-h-screen">

    <nav class="p-6 border-b border-white/10 flex justify-between items-center">
        <h1 class="font-black text-orange-500 uppercase tracking-widest">Kenflix Careers</h1>
        <a href="index.html" class="text-xs uppercase font-bold text-gray-400">Back Home</a>
    </nav>

    <main class="container mx-auto px-6 py-12">
        <h2 class="text-5xl font-black mb-10 uppercase italic">Live <span class="text-orange-500">Vacancies</span></h2>
        
        <div id="jobList" class="grid grid-cols-1 md:grid-cols-2 gap-8">
            <p class="animate-pulse text-gray-500 uppercase font-bold text-xs">Connecting to Google Sheet...</p>
        </div>
    </main>

    <script>
        // PASTE YOUR GOOGLE WEB APP URL HERE
        const SCRIPT_URL = "PASTE_YOUR_DEPLOYED_URL_HERE";

        async function fetchJobs() {
            const container = document.getElementById('jobList');
            try {
                const response = await fetch(SCRIPT_URL);
                const jobs = await response.json();

                if (jobs.length === 0) {
                    container.innerHTML = "<p class='text-gray-500'>No jobs found in the sheet.</p>";
                    return;
                }

                // Build the HTML for each job in the sheet
                container.innerHTML = jobs.map(job => `
                    <div class="bg-slate-900/50 p-8 rounded-[2rem] border border-white/5">
                        <div class="flex justify-between items-start mb-4">
                            <h3 class="text-2xl font-black uppercase text-white">${job.title || 'Untitled Role'}</h3>
                            <span class="text-[10px] text-gray-500 font-bold">${new Date(job.postedAt).toLocaleDateString()}</span>
                        </div>
                        <div class="flex gap-4 mb-6 text-[10px] font-black text-sky-400 uppercase">
                            <span>${job.location}</span>
                            <span class="text-orange-500">${job.pay}</span>
                        </div>
                        <p class="text-gray-400 text-sm mb-6 line-clamp-3">${job.fullContent}</p>
                        <a href="${job.link}" class="inline-block bg-white text-black px-6 py-2 rounded-lg text-[10px] font-black uppercase">Apply Now</a>
                    </div>
                `).join('');

            } catch (error) {
                container.innerHTML = "<p class='text-red-500 uppercase font-black text-xs'>Error: Check if the Web App URL is correct and deployed to 'Anyone'.</p>";
            }
        }

        window.onload = fetchJobs;
    </script>
</body>
</html>
