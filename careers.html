<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kenflix Careers | Live Vault</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background: #0f172a; color: #f8fafc; }
        .job-card { 
            background: rgba(30, 41, 59, 0.4); 
            border: 1px solid rgba(255,255,255,0.05); 
            border-radius: 2rem; 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .job-card:hover { 
            border-color: #f97316; 
            transform: translateY(-8px);
            background: rgba(30, 41, 59, 0.7);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3);
        }
        .text-brand-orange { color: #f97316; }
        .hidden { display: none; }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <nav class="p-6 border-b border-white/5 bg-slate-900/50 backdrop-blur-md sticky top-0 z-50">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-sky-400 font-black uppercase tracking-widest text-sm italic">Kenflix Portals</h1>
            <div class="flex gap-6 items-center">
                <span id="connection-dot" class="h-2 w-2 rounded-full bg-red-500 animate-pulse"></span>
                <a href="index.html" class="text-[10px] font-bold text-gray-500 uppercase tracking-widest hover:text-white transition">← Exit Vault</a>
            </div>
        </div>
    </nav>

    <main class="container mx-auto px-6 py-16">
        <header class="mb-16">
            <span class="text-sky-400 font-black text-[10px] uppercase tracking-[0.4em] block mb-4">Live Cloud Sync</span>
            <h1 class="text-6xl md:text-8xl font-black text-white leading-tight uppercase tracking-tighter">
                Careers <span class="text-brand-orange">Vault</span>
            </h1>
        </header>

        <div id="status-area" class="flex items-center gap-3 text-gray-500 uppercase tracking-widest text-[10px] font-bold italic mb-10">
            <div id="loader" class="animate-spin rounded-full h-4 w-4 border-2 border-brand-orange border-t-transparent"></div>
            <span id="status-text">Synchronizing with Google Sheets...</span>
        </div>

        <div id="jobGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-2 gap-8">
            </div>
    </main>

    <script>
        // 1. YOUR APPS SCRIPT URL (Replace with your current deployment URL)
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxifvk82I76Vt_fLPaDQgdjKPMqNYENi4JP3clerubLRf-qfwy43LAmTGqwNbm4-vFH/exec";
        const CACHE_KEY = 'kenflix_live_data';

        async function fetchRealData() {
            const grid = document.getElementById('jobGrid');
            const statusText = document.getElementById('status-text');
            const loader = document.getElementById('loader');
            const dot = document.getElementById('connection-dot');

            // Load from Cache first (Offline support)
            const offlineData = localStorage.getItem(CACHE_KEY);
            if (offlineData) {
                renderUI(JSON.parse(offlineData));
                statusText.innerText = "Showing Cached Data (Fetching Live...)";
            }

            try {
                // Fetch live data from the Sheet
                const response = await fetch(SCRIPT_URL);
                const jobs = await response.json();

                // Save to cache for next time
                localStorage.setItem(CACHE_KEY, JSON.stringify(jobs));

                // Update UI state
                loader.classList.add('hidden');
                dot.classList.remove('bg-red-500', 'animate-pulse');
                dot.classList.add('bg-green-500');
                statusText.innerText = `Connected: ${jobs.length} Real-Time Vacancies Found`;

                renderUI(jobs);

            } catch (error) {
                console.error("Cloud Fetch Error:", error);
                loader.classList.add('hidden');
                statusText.innerText = offlineData ? "Offline: Viewing Last Synced Data" : "Connection Error: Check Script URL";
            }
        }

        function renderUI(jobs) {
            const grid = document.getElementById('jobGrid');
            
            if (!jobs || jobs.length === 0) {
                grid.innerHTML = `<p class="text-gray-600 uppercase text-[10px] font-bold">No jobs found in the vault.</p>`;
                return;
            }

            grid.innerHTML = jobs.map(job => `
                <div class="job-card p-8 md:p-10 flex flex-col h-full">
                    <div class="flex justify-between items-start mb-8">
                        <div class="flex flex-col">
                            <span class="text-[10px] font-black text-sky-400 uppercase tracking-[0.2em] italic">${job.jobid}</span>
                            <span class="text-[9px] text-gray-600 font-bold uppercase mt-1">Ref: ${job.timeweposted ? new Date(job.timeweposted).toLocaleDateString() : 'N/A'}</span>
                        </div>
                        <div class="bg-brand-orange/10 px-3 py-1 rounded-full">
                             <span class="text-[9px] text-brand-orange font-black uppercase">Active</span>
                        </div>
                    </div>

                    <h2 class="text-3xl md:text-4xl font-black text-white mb-6 uppercase tracking-tighter leading-tight">${job.jobtitle}</h2>

                    <div class="grid grid-cols-2 gap-4 mb-8">
                        <div class="bg-white/5 p-4 rounded-2xl border border-white/5">
                            <p class="text-[8px] text-gray-500 uppercase font-black mb-1">Region</p>
                            <p class="text-xs font-bold text-white uppercase truncate">${job.location}</p>
                        </div>
                        <div class="bg-white/5 p-4 rounded-2xl border border-white/5">
                            <p class="text-[8px] text-gray-500 uppercase font-black mb-1">Budget/Salary</p>
                            <p class="text-xs font-bold text-brand-orange uppercase truncate">${job.salary}</p>
                        </div>
                    </div>

                    <p class="text-gray-400 text-sm leading-relaxed mb-10 line-clamp-3">${job.description}</p>

                    <div class="mt-auto pt-6 border-t border-white/5 space-y-4">
                        <div class="flex justify-between items-center px-1">
                            <span class="text-[9px] text-gray-500 uppercase font-black tracking-widest">Closing Date</span>
                            <span class="text-[10px] text-white font-black uppercase">${job.datedposted}</span>
                        </div>
                        <a href="${job.link || '#'}" target="_blank" class="flex items-center justify-center gap-2 bg-white text-black px-10 py-4 rounded-xl text-[10px] font-black uppercase tracking-[0.2em] hover:bg-brand-orange hover:text-white transition-all w-full text-center">
                            Apply for this Role
                            <i data-lucide="arrow-right" class="w-3 h-3"></i>
                        </a>
                    </div>
                </div>
            `).join('');

            lucide.createIcons();
        }

        window.onload = fetchRealData;
    </script>
</body>
</html>
