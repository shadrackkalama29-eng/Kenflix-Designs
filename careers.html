<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kenflix | Opportunities</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background: #0f172a; color: #f8fafc; }
        .job-card { background: rgba(30, 41, 59, 0.5); border: 1px solid rgba(255,255,255,0.05); border-radius: 2rem; }
        .text-brand { color: #f97316; }
        .bg-brand { background: #f97316; }
        .hidden { display: none; }
    </style>
</head>
<body class="min-h-screen">

    <nav class="p-6 border-b border-white/5 flex justify-between items-center bg-slate-900/50 backdrop-blur-lg sticky top-0 z-50">
        <a href="index.html" class="text-sky-400 font-bold">← Home</a>
        <button onclick="toggleAdmin()" id="adminBtn" class="bg-brand px-6 py-2 rounded-full text-[10px] font-black uppercase">Admin Portal</button>
    </nav>

    <main id="viewMode" class="container mx-auto px-6 py-16">
        <h1 class="text-6xl font-black mb-4">Find Your <span class="text-brand">Opportunity</span></h1>
        <p class="text-gray-400 mb-12 max-w-xl italic">Summarizing the best roles from across the region, delivered directly from our cloud database.</p>
        
        <div id="jobGrid" class="grid grid-cols-1 md:grid-cols-2 gap-8">
            </div>
    </main>

    <main id="adminMode" class="container mx-auto px-6 py-16 hidden">
        <div class="max-w-3xl mx-auto space-y-8">
            <div class="bg-slate-800/50 p-8 rounded-[2rem] border border-brand/20">
                <h2 class="text-2xl font-black mb-4 uppercase">New Data Entry</h2>
                <textarea id="rawInput" class="w-full h-48 bg-black/20 border border-white/10 rounded-2xl p-4 text-sm mb-4 outline-none focus:border-brand" placeholder="Paste information here to summarize..."></textarea>
                <button onclick="addEntry()" class="bg-brand text-white font-black px-8 py-3 rounded-xl uppercase text-xs">Analyze & Save to Sheet</button>
            </div>
            
            <div id="adminList" class="space-y-2">
                </div>
        </div>
    </main>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxifvk82I76Vt_fLPaDQgdjKPMqNYENi4JP3clerubLRf-qfwy43LAmTGqwNbm4-vFH/exec";

        async function fetchData() {
            const res = await fetch(SCRIPT_URL);
            const data = await res.json();
            
            // Render View Mode
            document.getElementById('jobGrid').innerHTML = data.map(j => `
                <div class="job-card p-8 flex flex-col">
                    <div class="flex justify-between items-start mb-4">
                        <h2 class="text-2xl font-black leading-tight uppercase">${j.title}</h2>
                        <span class="text-[9px] text-gray-500 font-bold uppercase">${new Date(j.postedAt).toLocaleDateString()}</span>
                    </div>
                    <div class="flex gap-4 mb-6 text-[10px] font-bold text-sky-400 uppercase tracking-widest">
                        <span>${j.location}</span> • <span>${j.pay}</span>
                    </div>
                    <p class="text-gray-400 text-sm mb-8 leading-relaxed">
                        ${j.fullContent.substring(0, 140)}...
                    </p>
                    <a href="${j.link}" target="_blank" class="mt-auto bg-white text-black px-6 py-2 rounded-lg text-[10px] font-black uppercase text-center hover:bg-brand hover:text-white transition">Full Details</a>
                </div>
            `).join('');

            // Render Admin Delete List
            document.getElementById('adminList').innerHTML = data.map(j => `
                <div class="flex justify-between p-4 bg-white/5 rounded-xl border border-white/5 items-center">
                    <span class="text-xs font-bold uppercase">${j.title}</span>
                    <button onclick="removeEntry('${j.id}')" class="text-red-500"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                </div>
            `).join('');
            lucide.createIcons();
        }

        async function addEntry() {
            const text = document.getElementById('rawInput').value;
            if(!text || prompt("Security Code:") !== "29") return;
            await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({action:"add", text}) });
            location.reload();
        }

        async function removeEntry(id) {
            if(!confirm("Delete?") || prompt("Security Code:") !== "29") return;
            await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({action:"delete", id}) });
            location.reload();
        }

        function toggleAdmin() {
            document.getElementById('viewMode').classList.toggle('hidden');
            document.getElementById('adminMode').classList.toggle('hidden');
        }

        window.onload = fetchData;
        lucide.createIcons();
    </script>
</body>
</html>
