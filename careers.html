<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kenflix Careers | Opportunities</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background: #0f172a; color: #f8fafc; }
        .job-card { background: rgba(30, 41, 59, 0.4); border: 1px solid rgba(255,255,255,0.05); border-radius: 2.5rem; }
        .bg-brand { background: #f97316; }
        .text-brand { color: #f97316; }
        .hidden { display: none; }
    </style>
</head>
<body class="min-h-screen">

    <nav class="p-6 border-b border-white/5 sticky top-0 bg-slate-900/80 backdrop-blur-md z-50">
        <div class="container mx-auto flex justify-between items-center">
            <a href="index.html" class="text-sky-400 font-bold tracking-tighter uppercase text-sm italic">Kenflix Portals</a>
            <button onclick="toggleAdmin()" id="adminBtn" class="bg-brand px-6 py-2 rounded-full text-[10px] font-black uppercase tracking-widest shadow-lg shadow-orange-500/20">Admin Dashboard</button>
        </div>
    </nav>

    <main id="viewMode" class="container mx-auto px-6 py-16">
        <header class="mb-20">
            <h1 class="text-6xl md:text-8xl font-black text-white leading-tight uppercase tracking-tighter">Find Your <br><span class="text-brand">Opportunity</span></h1>
            <p class="mt-6 max-w-xl text-gray-400 text-lg italic border-l-2 border-brand pl-6">
                Connecting Kenya's top talent with global institutions. Our cloud database summarizes live vacancies across Nairobi and beyond.
            </p>
        </header>

        <div id="loading" class="flex items-center gap-3 text-gray-500 uppercase text-[10px] font-bold tracking-[0.3em] mb-10">
            <div class="animate-spin rounded-full h-4 w-4 border-2 border-brand border-t-transparent"></div> Syncing Global Database...
        </div>

        <div id="jobGrid" class="grid grid-cols-1 md:grid-cols-2 gap-8"></div>
    </main>

    <main id="adminMode" class="container mx-auto px-6 py-16 hidden">
        <div class="max-w-4xl mx-auto space-y-12">
            <div class="bg-slate-900/50 p-10 rounded-[3rem] border border-brand/20">
                <h2 class="text-2xl font-black text-white mb-6 uppercase italic">Analyze & <span class="text-brand">Publish</span></h2>
                <textarea id="rawInput" class="w-full h-80 bg-black/40 border border-white/10 rounded-3xl p-8 text-white text-sm outline-none focus:border-brand mb-6" placeholder="Paste the Finance Manager description here..."></textarea>
                <button onclick="publish()" id="pubBtn" class="bg-brand text-white font-black px-12 py-4 rounded-2xl uppercase tracking-widest text-xs">Analyze Live</button>
            </div>

            <div class="bg-slate-900/50 p-10 rounded-[3rem] border border-white/5">
                <h2 class="text-xl font-black text-white mb-6 uppercase tracking-widest">Database Management</h2>
                <div id="adminList" class="space-y-4"></div>
            </div>
        </div>
    </main>

    <script>
        // PASTE YOUR URL HERE
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxifvk82I76Vt_fLPaDQgdjKPMqNYENi4JP3clerubLRf-qfwy43LAmTGqwNbm4-vFH/exec";
        let liveJobs = [];

        async function load() {
            try {
                const res = await fetch(SCRIPT_URL);
                liveJobs = await res.json();
                document.getElementById('loading').style.display = 'none';
                render();
            } catch(e) { console.error("Database Error"); }
        }

        function render() {
            const grid = document.getElementById('jobGrid');
            const list = document.getElementById('adminList');

            // View Mode Mapping
            grid.innerHTML = liveJobs.map(j => `
                <div class="job-card p-10 flex flex-col h-full hover:border-brand transition-all">
                    <div class="flex justify-between mb-8">
                        <span class="text-[10px] font-black text-sky-400 uppercase tracking-widest italic">Live Listing</span>
                        <span class="text-[9px] text-gray-600 font-bold uppercase">${new Date(j.postedAt).toLocaleDateString()}</span>
                    </div>
                    <h2 class="text-4xl font-black text-white mb-6 uppercase tracking-tighter leading-none">${j.title}</h2>
                    <div class="grid grid-cols-2 gap-4 mb-8">
                        <div class="bg-white/5 p-4 rounded-2xl border border-white/5">
                            <p class="text-[8px] text-gray-500 uppercase font-black mb-1">Loc</p>
                            <p class="text-xs font-bold text-white uppercase">${j.location}</p>
                        </div>
                        <div class="bg-white/5 p-4 rounded-2xl border border-white/5">
                            <p class="text-[8px] text-gray-500 uppercase font-black mb-1">Pay</p>
                            <p class="text-xs font-bold text-brand uppercase">${j.pay}</p>
                        </div>
                    </div>
                    <p class="text-gray-400 text-sm leading-relaxed mb-10">
                        ${j.fullContent.substring(0, 180)}...
                    </p>
                    <a href="${j.link}" target="_blank" class="mt-auto bg-white text-black text-center py-4 rounded-xl text-[10px] font-black uppercase tracking-widest hover:bg-brand hover:text-white transition">Full Application</a>
                </div>
            `).join('');

            // Admin List Mapping
            list.innerHTML = liveJobs.map(j => `
                <div class="flex items-center justify-between p-4 bg-white/5 rounded-2xl border border-white/5">
                    <p class="text-xs font-bold text-white uppercase tracking-widest">${j.title}</p>
                    <button onclick="removeJob('${j.id}')" class="text-red-500 hover:bg-red-500/10 p-2 rounded-lg transition"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                </div>
            `).join('');
            lucide.createIcons();
        }

        async function publish() {
            const text = document.getElementById('rawInput').value;
            if(!text || prompt("Admin Code:") !== "29") return;
            document.getElementById('pubBtn').innerText = "Analyzing Content...";
            await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({action: "add", text}) });
            location.reload();
        }

        async function removeJob(id) {
            if(!confirm("Delete?") || prompt("Admin Code:") !== "29") return;
            await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({action: "delete", id}) });
            location.reload();
        }

        function toggleAdmin() {
            document.getElementById('viewMode').classList.toggle('hidden');
            document.getElementById('adminMode').classList.toggle('hidden');
            document.getElementById('adminBtn').innerText = document.getElementById('adminMode').classList.contains('hidden') ? "Admin Dashboard" : "Close Dashboard";
        }

        window.onload = load;
        lucide.createIcons();
    </script>
</body>
</html>
