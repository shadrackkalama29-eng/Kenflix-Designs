<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kenflix Career Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background: #020617; color: #F3F4F6; min-height: 100vh; }
        .text-brand-orange { color: #f97316; }
        .bg-brand-orange { background-color: #f97316; }
        .job-card { 
            background: rgba(30, 41, 59, 0.4); 
            backdrop-filter: blur(10px); 
            border: 1px solid rgba(255,255,255,0.05); 
            border-radius: 1.5rem; 
            transition: 0.3s; 
        }
        .job-card:hover { border-color: #f97316; transform: translateY(-4px); }
        .loader { border: 3px solid #1e293b; border-top: 3px solid #f97316; border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; display: none; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="flex flex-col">

    <nav class="p-6 border-b border-white/5 sticky top-0 bg-slate-950/80 backdrop-blur-lg z-50">
        <div class="container mx-auto flex justify-between items-center">
            <a href="index.html" class="text-sky-400 font-bold flex items-center gap-2">
                <i data-lucide="arrow-left" class="w-4 h-4"></i> Home
            </a>
            <div class="hidden lg:flex gap-8 text-[11px] uppercase tracking-widest font-bold text-gray-400">
                <a href="index.html#web-design" class="hover:text-brand-orange">Web Design</a>
                <a href="index.html#graphics-design" class="hover:text-brand-orange">Graphics</a>
                <a href="portfolio.html" class="hover:text-brand-orange">Portfolio</a>
            </div>
            <button onclick="openAdmin()" class="bg-brand-orange px-6 py-2 rounded-full text-xs font-black uppercase tracking-widest">Post Job</button>
        </div>
    </nav>

    <header class="container mx-auto px-6 pt-20 pb-12">
        <span class="text-sky-400 font-black text-[10px] uppercase tracking-[0.4em] mb-4 block">LIVE OPPORTUNITIES</span>
        <h1 class="text-5xl md:text-7xl font-black text-white leading-tight uppercase tracking-tighter">
            Kenflix <span class="text-brand-orange">Portal</span>
        </h1>
    </header>

    <main class="container mx-auto px-6 pb-24 flex-grow">
        <div id="loading-state" class="text-center py-20 text-gray-500 uppercase tracking-widest text-xs">Fetching latest roles...</div>
        <div id="job-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8"></div>
    </main>

    <div id="adminModal" class="fixed inset-0 bg-slate-950/95 z-[100] hidden flex items-center justify-center p-6">
        <div class="bg-slate-900 border border-white/10 p-10 rounded-[2rem] w-full max-w-2xl">
            <h3 class="text-white font-black uppercase mb-2">Paste Job Details</h3>
            <p class="text-gray-500 text-xs mb-6 uppercase tracking-widest">Our AI will automatically extract Title, Location, and Pay.</p>
            <textarea id="rawInput" class="w-full h-64 bg-black/40 border border-white/10 p-6 rounded-2xl text-white text-sm outline-none focus:border-brand-orange transition mb-6" placeholder="Example: Job Title: Accountant. Location: Nairobi. Salary: 50k..."></textarea>
            
            <div class="flex items-center gap-4">
                <button id="publishBtn" onclick="submitJob()" class="flex-grow bg-brand-orange text-white font-black py-4 rounded-xl uppercase tracking-widest text-xs">Publish to Website</button>
                <div id="btnLoader" class="loader"></div>
                <button onclick="closeAdmin()" class="text-gray-500 text-xs font-bold uppercase">Cancel</button>
            </div>
        </div>
    </div>

    <script>
        const SCRIPT_URL = "PASTE_YOUR_APPS_SCRIPT_URL_HERE";

        async function fetchJobs() {
            try {
                const res = await fetch(SCRIPT_URL);
                const data = await res.json();
                document.getElementById('loading-state').style.display = 'none';
                displayJobs(data);
            } catch (e) { console.error("Load failed", e); }
        }

        function displayJobs(jobs) {
            const grid = document.getElementById('job-grid');
            grid.innerHTML = jobs.map(j => `
                <div class="job-card p-8 flex flex-col h-full">
                    <h2 class="text-2xl font-black text-white mb-6 leading-tight uppercase">${j.title}</h2>
                    <div class="space-y-3 mb-8 text-sm font-bold text-gray-400">
                        <div class="flex items-center gap-3"><i data-lucide="map-pin" class="w-4 h-4 text-brand-orange"></i> ${j.location}</div>
                        <div class="flex items-center gap-3"><i data-lucide="banknote" class="w-4 h-4 text-brand-orange"></i> ${j.pay}</div>
                    </div>
                    <div class="mt-auto pt-6 border-t border-white/5 flex justify-between items-center">
                        <a href="${j.link}" target="_blank" class="bg-white text-black px-6 py-2 rounded-lg text-[10px] font-black uppercase tracking-widest hover:bg-brand-orange hover:text-white transition">Apply Now</a>
                        <span class="text-[9px] text-gray-600 font-bold uppercase">${new Date(j.postedAt).toLocaleDateString()}</span>
                    </div>
                </div>
            `).join('');
            lucide.createIcons();
        }

        async function submitJob() {
            const text = document.getElementById('rawInput').value;
            if(!text || prompt("Enter Admin Code:") !== "29") return;

            document.getElementById('publishBtn').disabled = true;
            document.getElementById('btnLoader').style.display = 'block';

            await fetch(SCRIPT_URL, {
                method: 'POST',
                body: JSON.stringify({ text: text })
            });

            location.reload(); 
        }

        function openAdmin() { document.getElementById('adminModal').classList.remove('hidden'); }
        function closeAdmin() { document.getElementById('adminModal').classList.add('hidden'); }

        window.onload = fetchJobs;
        lucide.createIcons();
    </script>
</body>
</html>
