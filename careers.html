<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kenflix Career Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            background: #0f172a; 
            color: #f8fafc; 
            min-height: 100vh;
            background-image: radial-gradient(circle at 0% 0%, rgba(56, 189, 248, 0.08), transparent 40%);
        }
        .text-brand-orange { color: #f97316; }
        .bg-brand-orange { background-color: #f97316; }
        .job-card { 
            background: rgba(30, 41, 59, 0.4); 
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.05); 
            border-radius: 2.5rem; 
            transition: all 0.3s ease; 
        }
        .job-card:hover { 
            border-color: #f97316; 
            transform: translateY(-6px);
            background: rgba(30, 41, 59, 0.6);
        }
        .admin-area {
            background: rgba(15, 23, 42, 0.9);
            border: 1px solid rgba(249, 115, 22, 0.2);
            border-radius: 3rem;
        }
        .loader { 
            border: 3px solid rgba(255,255,255,0.1); 
            border-top: 3px solid #f97316; 
            border-radius: 50%; 
            width: 20px; 
            height: 20px; 
            animation: spin 1s linear infinite; 
            display: none;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .hidden { display: none; }
    </style>
</head>
<body class="flex flex-col">

    <nav class="p-6 border-b border-white/5 sticky top-0 bg-slate-900/90 backdrop-blur-md z-50">
        <div class="container mx-auto flex justify-between items-center">
            <a href="index.html" class="text-sky-400 font-bold flex items-center gap-2 hover:text-white transition">
                <i data-lucide="arrow-left" class="w-4 h-4"></i> Home
            </a>
            <div class="hidden lg:flex gap-8">
                <a href="index.html#web-design" class="text-[10px] font-black uppercase tracking-widest text-gray-400 hover:text-brand-orange">Web Design</a>
                <a href="portfolio.html" class="text-[10px] font-black uppercase tracking-widest text-gray-400 hover:text-brand-orange">Portfolio</a>
            </div>
            <button onclick="toggleAdmin()" id="adminBtn" class="bg-brand-orange hover:bg-orange-600 text-white px-6 py-2 rounded-full text-[10px] font-black uppercase tracking-widest transition shadow-lg shadow-orange-500/20">
                Admin Portal
            </button>
        </div>
    </nav>

    <main id="viewMode" class="container mx-auto px-6 py-16">
        <header class="mb-20">
            <span class="text-sky-400 font-black text-[10px] uppercase tracking-[0.4em] block mb-4">Kenflix Career Portal</span>
            <h1 class="text-6xl md:text-8xl font-black text-white leading-tight uppercase tracking-tighter">
                Find Your <br><span class="text-brand-orange">Opportunity</span>
            </h1>
        </header>

        <div id="loading-state" class="flex items-center gap-3 text-gray-500 uppercase tracking-widest text-xs italic">
            <div class="loader" style="display:block"></div> Syncing with global database...
        </div>

        <div id="jobGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            </div>
    </main>

    <main id="adminMode" class="container mx-auto px-6 py-16 hidden">
        <div class="max-w-4xl mx-auto">
            <header class="mb-12">
                <h2 class="text-4xl font-black text-white uppercase italic">Automatic <span class="text-brand-orange">Analysis</span></h2>
                <p class="text-gray-400 mt-2 text-sm uppercase tracking-widest">Paste the job details. Our system will extract the title, location, and payment.</p>
            </header>

            <div class="admin-area p-8 md:p-12 shadow-2xl">
                <textarea id="rawInput" class="w-full h-80 bg-black/40 border border-white/10 rounded-[2rem] p-8 text-white text-sm outline-none focus:border-brand-orange transition-all mb-8 font-mono" placeholder="Paste full job description here..."></textarea>
                
                <div class="flex flex-col md:flex-row gap-6 items-center">
                    <button onclick="submitToDatabase()" id="publishBtn" class="w-full md:w-auto bg-brand-orange text-white font-black px-12 py-5 rounded-2xl uppercase tracking-widest text-xs hover:scale-105 transition shadow-xl shadow-orange-500/20">
                        Analyze & Publish
                    </button>
                    <div id="statusLoader" class="loader"></div>
                    <p id="statusText" class="text-[10px] font-black text-gray-500 uppercase tracking-widest"></p>
                </div>
            </div>
        </div>
    </main>

    <script>
        // Your Verified Deployment URL
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxifvk82I76Vt_fLPaDQgdjKPMqNYENi4JP3clerubLRf-qfwy43LAmTGqwNbm4-vFH/exec";

        // 1. Fetch data for viewers
        async function loadJobs() {
            try {
                const res = await fetch(SCRIPT_URL);
                const data = await res.json();
                
                document.getElementById('loading-state').classList.add('hidden');
                const grid = document.getElementById('jobGrid');

                if (data.length === 0) {
                    grid.innerHTML = `<p class="text-gray-600 uppercase text-xs tracking-widest py-10">No active vacancies found.</p>`;
                    return;
                }

                grid.innerHTML = data.map(j => `
                    <article class="job-card p-10 flex flex-col h-full">
                        <span class="text-[9px] font-black text-sky-400 uppercase mb-6 tracking-widest">Available Role</span>
                        <h2 class="text-3xl font-black text-white mb-6 leading-tight uppercase tracking-tight">${j.title}</h2>
                        
                        <div class="space-y-4 mb-10 text-[13px] font-bold text-gray-400 uppercase tracking-wider">
                            <div class="flex items-center gap-3"><i data-lucide="map-pin" class="w-4 h-4 text-brand-orange"></i> ${j.location}</div>
                            <div class="flex items-center gap-3"><i data-lucide="banknote" class="w-4 h-4 text-brand-orange"></i> ${j.pay}</div>
                        </div>

                        <div class="mt-auto pt-8 border-t border-white/5 flex justify-between items-center">
                            <a href="${j.link}" target="_blank" class="bg-white text-black px-8 py-3 rounded-xl text-[10px] font-black uppercase tracking-widest hover:bg-brand-orange hover:text-white transition">Apply Now</a>
                            <span class="text-[9px] text-gray-600 font-black uppercase tracking-tighter italic">${new Date(j.postedAt).toLocaleDateString()}</span>
                        </div>
                    </article>
                `).join('');
                lucide.createIcons();
            } catch (e) {
                document.getElementById('loading-state').innerHTML = `<span class="text-red-500">Database offline. Verify Apps Script deployment.</span>`;
            }
        }

        // 2. Submit & Analyze for Admin
        async function submitToDatabase() {
            const rawText = document.getElementById('rawInput').value;
            if (!rawText) return alert("Please paste job details first.");

            const pin = prompt("Enter Security Pin:");
            if (pin !== "29") return alert("Unauthorized access.");

            const btn = document.getElementById('publishBtn');
            const loader = document.getElementById('statusLoader');
            const status = document.getElementById('statusText');

            btn.disabled = true;
            loader.style.display = 'block';
            status.innerText = "Extracting details...";

            try {
                await fetch(SCRIPT_URL, {
                    method: 'POST',
                    body: JSON.stringify({ text: rawText })
                });

                status.innerText = "Successfully Published!";
                document.getElementById('rawInput').value = "";
                setTimeout(() => {
                    toggleAdmin();
                    loadJobs();
                }, 1500);

            } catch (e) {
                status.innerText = "Upload failed. Try again.";
            } finally {
                btn.disabled = false;
                loader.style.display = 'none';
            }
        }

        function toggleAdmin() {
            const isClosing = !document.getElementById('adminMode').classList.contains('hidden');
            document.getElementById('viewMode').classList.toggle('hidden');
            document.getElementById('adminMode').classList.toggle('hidden');
            document.getElementById('adminBtn').innerText = isClosing ? "Admin Portal" : "Exit Portal";
        }

        window.onload = loadJobs;
        lucide.createIcons();
    </script>
</body>
</html>
