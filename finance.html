<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finance Vault | Kenflix Premium</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #070b14; color: #f8fafc; }
        .text-brand-orange { color: #f97316; }
        .text-sky-blue { color: #38bdf8; }
        .doc-card { 
            background: linear-gradient(145deg, rgba(30, 41, 59, 0.4), rgba(15, 23, 42, 0.1));
            border: 1px solid rgba(56, 189, 248, 0.05); 
            border-radius: 2rem; 
            transition: all 0.3s ease;
        }
        .doc-card:hover { border-color: rgba(56, 189, 248, 0.4); transform: translateY(-5px); }
        .modal-blur { backdrop-filter: blur(20px); background: rgba(7, 11, 20, 0.95); }
    </style>
</head>
<body class="min-h-screen">

    <nav class="p-8 border-b border-white/5 flex justify-between items-center bg-[#070b14]/80 backdrop-blur-md sticky top-0 z-50">
        <h1 class="text-white font-bold text-xl uppercase tracking-tighter">Kenflix<span class="text-sky-blue">Vault</span></h1>
        <div class="flex items-center gap-2">
            <span id="connection-dot" class="h-2 w-2 rounded-full bg-red-500"></span>
            <span class="text-[9px] font-black text-sky-blue/60 uppercase tracking-widest">Protocol v8.6</span>
        </div>
    </nav>

    <main class="container mx-auto px-6 py-20">
        <header class="mb-16">
            <h1 class="text-6xl font-bold text-white uppercase tracking-tighter mb-4">Finance <span class="text-brand-orange">Vault</span></h1>
            <p class="text-gray-400 max-w-xl">Proprietary financial intelligence and asset registry. All documents are live-synced from the administrative node.</p>
        </header>

        <div id="vaultGrid" class="grid grid-cols-1 md:grid-cols-3 gap-8">
            <div class="col-span-full text-center py-20 opacity-50">Synchronizing Vault...</div>
        </div>
    </main>

    <div id="pdfOverlay" class="fixed inset-0 z-[100] hidden flex flex-col md:flex-row modal-blur p-4">
        <div class="w-full md:w-1/3 p-8 flex flex-col justify-between">
            <div>
                <button onclick="closeViewer()" class="text-gray-500 hover:text-white mb-8 flex items-center gap-2 text-[10px] font-black uppercase">
                    <i data-lucide="arrow-left" class="w-4 h-4"></i> Close
                </button>
                <h2 id="viewingTitle" class="text-3xl font-bold text-white uppercase mb-4"></h2>
                <p id="viewingDesc" class="text-gray-400 font-light"></p>
            </div>
            <a id="dlBtn" href="#" target="_blank" class="w-full bg-white text-black py-4 rounded-xl text-center font-black text-[10px] uppercase hover:bg-brand-orange hover:text-white transition-all">Download Asset</a>
        </div>
        <div class="flex-grow rounded-3xl overflow-hidden border border-white/10 bg-black">
            <iframe id="pdfFrame" src="" class="w-full h-full"></iframe>
        </div>
    </div>

    <script>
        // 1. UPDATE THIS URL
        const SCRIPT_URL = "PASTE_YOUR_DEPLOYMENT_URL_HERE"; 

        async function initVault() {
            const grid = document.getElementById('vaultGrid');
            try {
                // We add a timestamp to prevent browser caching
                const response = await fetch(`${SCRIPT_URL}?sheet=FinanceVault&t=${Date.now()}`);
                const data = await response.json();

                if (data.error) throw new Error(data.error);

                document.getElementById('connection-dot').classList.replace('bg-red-500', 'bg-green-500');
                
                grid.innerHTML = data.map(doc => `
                    <div class="doc-card p-8 flex flex-col">
                        <div class="w-10 h-10 bg-sky-blue/10 rounded-xl flex items-center justify-center text-sky-blue mb-6">
                            <i data-lucide="file-text" class="w-5 h-5"></i>
                        </div>
                        <h2 class="text-xl font-bold text-white mb-4 uppercase tracking-tight">${doc.title}</h2>
                        <p class="text-gray-500 text-sm mb-8 line-clamp-2">${doc.description}</p>
                        <button onclick="openViewer('${doc.id}')" class="mt-auto w-full border border-white/10 py-3 rounded-xl text-[10px] font-black uppercase hover:bg-sky-blue hover:text-black transition-all">Access File</button>
                    </div>
                `).join('');
                allDocs = data;
                lucide.createIcons();

            } catch (err) {
                grid.innerHTML = `<div class="col-span-full text-center text-red-500 uppercase font-black tracking-widest">
                    Secure Node Timeout<br><span class="text-[10px] opacity-50">${err.message}</span>
                </div>`;
            }
        }

        let allDocs = [];
        function openViewer(id) {
            const doc = allDocs.find(d => d.id == id);
            if(!doc) return;
            document.getElementById('viewingTitle').innerText = doc.title;
            document.getElementById('viewingDesc').innerText = doc.description;
            document.getElementById('pdfFrame').src = doc.pdflink.replace('/view', '/preview');
            document.getElementById('dlBtn').href = doc.pdflink;
            document.getElementById('pdfOverlay').classList.remove('hidden');
        }

        function closeViewer() {
            document.getElementById('pdfOverlay').classList.add('hidden');
            document.getElementById('pdfFrame').src = "";
        }

        window.onload = initVault;
    </script>
</body>
</html>
