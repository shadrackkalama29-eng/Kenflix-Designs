<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finance Intelligence | Kenflix</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Space Grotesk', sans-serif; background: #020617; color: #f1f5f9; }
        .stat-card { background: linear-gradient(180deg, rgba(30,41,59,0.5) 0%, rgba(15,23,42,0) 100%); border: 1px solid rgba(255,255,255,0.05); }
        .asset-card { 
            background: rgba(15, 23, 42, 0.6); 
            border: 1px solid rgba(56, 189, 248, 0.1); 
            transition: all 0.3s ease;
        }
        .asset-card:hover { border-color: #f97316; transform: translateY(-4px); box-shadow: 0 10px 30px -10px rgba(249, 115, 22, 0.2); }
        .trending-tag { background: linear-gradient(90deg, #f97316, #ea580c); }
    </style>
</head>
<body class="min-h-screen">

    <nav class="border-b border-white/5 p-6 flex justify-between items-center sticky top-0 bg-[#020617]/90 backdrop-blur-md z-50">
        <div class="flex items-center gap-4">
            <div class="h-8 w-1 bg-sky-500"></div>
            <h1 class="font-bold text-xl tracking-widest uppercase">Kenflix <span class="text-sky-400">Finance</span></h1>
        </div>
        <div class="text-[10px] font-mono text-white/40 bg-white/5 px-4 py-2 rounded-full border border-white/10">
            SYSTEM STATUS: <span class="text-emerald-400">ENCRYPTED</span>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-6 py-12">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-16">
            <div class="stat-card p-8 rounded-3xl">
                <p class="text-xs font-bold text-white/40 uppercase tracking-widest mb-2">Total Assets Managed</p>
                <h2 id="totalAssets" class="text-4xl font-bold">--</h2>
            </div>
            <div class="stat-card p-8 rounded-3xl border-l-4 border-l-sky-500">
                <p class="text-xs font-bold text-white/40 uppercase tracking-widest mb-2">Market Sentiment</p>
                <h2 class="text-4xl font-bold text-sky-400 font-mono">STABLE</h2>
            </div>
            <div class="stat-card p-8 rounded-3xl">
                <p class="text-xs font-bold text-white/40 uppercase tracking-widest mb-2">Global Access Level</p>
                <h2 class="text-4xl font-bold text-orange-500">PREMIUM</h2>
            </div>
        </div>

        <div class="flex justify-between items-end mb-8">
            <div>
                <h2 class="text-3xl font-bold tracking-tighter">ASSET REGISTRY</h2>
                <p class="text-gray-500 text-sm">Real-time proprietary financial documents and salary scaling.</p>
            </div>
        </div>

        <div id="vaultGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            </div>
    </main>

    <div id="viewerModal" class="fixed inset-0 z-[100] hidden bg-black/95 backdrop-blur-xl flex flex-col p-4">
        <div class="flex justify-between items-center mb-4 px-4">
            <h3 id="modalTitle" class="text-xl font-bold uppercase"></h3>
            <button onclick="closeViewer()" class="p-2 hover:bg-white/10 rounded-full"><i data-lucide="x"></i></button>
        </div>
        <iframe id="viewerFrame" src="" class="flex-grow w-full rounded-2xl border border-white/10"></iframe>
    </div>

    <script>
        const URL = "https://script.google.com/macros/s/AKfycbzaYM3K_pEgJRzoxwHRfi17pOKL71AWL_tW8_N_0O_ewC7pGj4nO7IaTULNInKxygxcyQ/exec";
        let vaultData = [];

        async function init() {
            const resp = await fetch(`${URL}?t=${Date.now()}`);
            vaultData = await resp.json();
            document.getElementById('totalAssets').innerText = vaultData.length.toString().padStart(2, '0');
            
            const maxDls = Math.max(...vaultData.map(d => parseInt(d.downloads || 0)));
            render(maxDls);
        }

        function render(max) {
            const grid = document.getElementById('vaultGrid');
            grid.innerHTML = vaultData.map(doc => {
                const trending = parseInt(doc.downloads) === max && max > 0;
                return `
                <div class="asset-card p-8 rounded-[2rem] relative flex flex-col h-full">
                    ${trending ? '<span class="absolute top-6 right-6 trending-tag px-3 py-1 rounded-full text-[9px] font-black uppercase">Most Active</span>' : ''}
                    <div class="text-sky-400 mb-6"><i data-lucide="bar-chart-3"></i></div>
                    <h3 class="text-xl font-bold mb-2 uppercase tracking-tight">${doc.title}</h3>
                    <div class="flex items-center gap-2 mb-4">
                        <span class="text-[10px] bg-white/5 border border-white/10 px-2 py-1 rounded text-white/50 font-mono">${doc.type}</span>
                        <span class="text-[10px] text-orange-400 font-bold uppercase tracking-widest">${doc.salary}</span>
                    </div>
                    <p class="text-gray-500 text-sm mb-8 flex-grow leading-relaxed">${doc.description}</p>
                    <div class="grid grid-cols-2 gap-3 pt-6 border-t border-white/5">
                        <button onclick="openViewer('${doc.id}')" class="py-3 text-[10px] font-bold uppercase border border-white/10 rounded-xl hover:bg-white hover:text-black transition-all">Preview</button>
                        <a href="${doc.pdflink}" target="_blank" class="py-3 text-[10px] font-bold uppercase bg-sky-500 text-black rounded-xl text-center hover:bg-sky-400 transition-all">Download</a>
                    </div>
                </div>
            `}).join('');
            lucide.createIcons();
        }

        function openViewer(id) {
            const item = vaultData.find(d => d.id == id);
            document.getElementById('modalTitle').innerText = item.title;
            document.getElementById('viewerFrame').src = item.pdflink.replace('/view', '/preview');
            document.getElementById('viewerModal').classList.remove('hidden');
        }

        function closeViewer() {
            document.getElementById('viewerModal').classList.add('hidden');
            document.getElementById('viewerFrame').src = "";
        }

        window.onload = init;
    </script>
</body>
</html>
