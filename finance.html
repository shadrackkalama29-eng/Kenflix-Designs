<!DOCTYPE html>
<html>
<head>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Space Grotesk', sans-serif; background: #020617; color: #f1f5f9; }
        .asset-card { background: rgba(15, 23, 42, 0.6); border: 1px solid rgba(255, 255, 255, 0.05); transition: all 0.3s ease; }
        .asset-card:hover { border-color: #38bdf8; transform: translateY(-4px); }
        .trending-badge { background: #f97316; box-shadow: 0 0 15px rgba(249, 115, 22, 0.4); }
    </style>
</head>
<body>
    <nav class="border-b border-white/5 p-6 flex justify-between items-center bg-[#020617]/90 sticky top-0 z-50">
        <h1 class="font-bold text-xl tracking-widest uppercase">Kenflix <span class="text-sky-400">Vault</span></h1>
        <div class="px-4 py-1 rounded-full bg-white/5 border border-white/10 text-[10px] text-gray-400">DATABASE ACTIVE</div>
    </nav>

    <main class="max-w-7xl mx-auto px-6 py-12">
        <header class="mb-12">
            <h1 class="text-5xl font-extrabold tracking-tighter uppercase mb-2">Asset <span class="text-sky-400">Registry</span></h1>
            <p class="text-gray-500">Access and download technical documentation and assets.</p>
        </header>

        <div id="vaultGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            <div class="col-span-full py-20 text-center animate-pulse text-white/20">LOADING SYSTEM DATA...</div>
        </div>
    </main>

    <div id="viewerModal" class="fixed inset-0 z-[100] hidden bg-black/95 backdrop-blur-xl flex flex-col p-4">
        <div class="flex justify-between items-center mb-4 px-4">
            <h3 id="modalTitle" class="text-xl font-bold uppercase text-sky-400"></h3>
            <button onclick="closeViewer()" class="p-2 hover:bg-white/10 rounded-full text-white"><i data-lucide="x"></i></button>
        </div>
        <iframe id="viewerFrame" src="" class="flex-grow w-full rounded-2xl border border-white/10"></iframe>
    </div>

    <script>
        function loadData() { google.script.run.withSuccessHandler(render).getVaultData(); }

        function render(data) {
            const grid = document.getElementById('vaultGrid');
            const maxDls = Math.max(...data.map(d => parseInt(d.downloads || 0)));

            grid.innerHTML = data.map(doc => {
                const isTrending = parseInt(doc.downloads) === maxDls && maxDls > 0;
                return `
                <div class="asset-card p-8 rounded-[2rem] relative flex flex-col h-full">
                    ${isTrending ? '<span class="absolute top-6 right-6 trending-badge text-white px-3 py-1 rounded-full text-[9px] font-black uppercase tracking-widest">Trending</span>' : ''}
                    <div class="text-sky-400 mb-6"><i data-lucide="file-text"></i></div>
                    <h3 class="text-xl font-bold mb-1 uppercase">${doc.title}</h3>
                    <div class="mb-4"><span class="text-[10px] bg-sky-400/10 px-2 py-1 rounded text-sky-400 font-bold uppercase">${doc.type}</span></div>
                    <p class="text-gray-500 text-sm mb-8 leading-relaxed line-clamp-3">${doc.description}</p>
                    <div class="mt-auto grid grid-cols-2 gap-3 pt-6 border-t border-white/5">
                        <button onclick="openViewer('${doc.pdflink}', '${doc.title}')" class="py-3 text-[10px] font-bold uppercase border border-white/10 rounded-xl hover:bg-white hover:text-black transition-all">View Online</button>
                        <a href="${doc.pdflink}" target="_blank" class="py-3 text-[10px] font-bold uppercase bg-sky-500 text-black rounded-xl text-center hover:bg-sky-400 transition-all">Download</a>
                    </div>
                </div>`;
            }).join('');
            lucide.createIcons();
        }

        function openViewer(link, title) {
            document.getElementById('modalTitle').innerText = title;
            document.getElementById('viewerFrame').src = link.replace('/view', '/preview');
            document.getElementById('viewerModal').classList.remove('hidden');
        }

        function closeViewer() {
            document.getElementById('viewerModal').classList.add('hidden');
            document.getElementById('viewerFrame').src = "";
        }
        window.onload = loadData;
    </script>
</body>
</html>
