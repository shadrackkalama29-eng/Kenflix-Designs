<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finance Vault | Kenflix Premium</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #070b14; color: #f8fafc; overflow-x: hidden; }
        
        /* Document Card Styling */
        .doc-card { 
            background: linear-gradient(145deg, rgba(30, 41, 59, 0.4), rgba(15, 23, 42, 0.1));
            border: 1px solid rgba(56, 189, 248, 0.05); 
            border-radius: 2.5rem; 
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        /* Trending Hover Effect (Orange Border) */
        .doc-card.is-trending { border-color: rgba(249, 115, 22, 0.2); }
        .doc-card.is-trending:hover {
            border-color: #f97316;
            transform: translateY(-10px);
            box-shadow: 0 20px 40px -15px rgba(249, 115, 22, 0.3);
        }

        /* Standard Hover Effect (Blue Border) */
        .doc-card:not(.is-trending):hover {
            border-color: #38bdf8;
            transform: translateY(-5px);
        }

        /* Split-Screen Viewer Blur */
        .modal-blur { backdrop-filter: blur(30px); background: rgba(7, 11, 20, 0.98); }
        
        .trending-badge {
            background: linear-gradient(90deg, #f97316, #ea580c);
            box-shadow: 0 4px 12px rgba(249, 115, 22, 0.3);
        }
    </style>
</head>
<body class="min-h-screen">

    <nav class="p-8 border-b border-white/5 flex justify-between items-center bg-[#070b14]/80 backdrop-blur-md sticky top-0 z-50">
        <h1 class="text-white font-bold text-xl uppercase tracking-tighter">Kenflix<span class="text-sky-400">Vault</span></h1>
        <div class="flex items-center gap-3">
            <span id="connection-dot" class="h-2 w-2 rounded-full bg-red-500 animate-pulse"></span>
            <span class="text-[9px] font-black text-sky-400/60 uppercase tracking-[0.3em]">Secure Data Link</span>
        </div>
    </nav>

    <main class="container mx-auto px-6 py-20">
        <header class="mb-20">
            <h1 class="text-6xl md:text-7xl font-extrabold text-white uppercase tracking-tighter mb-4">Finance <span class="text-[#f97316]">Vault</span></h1>
            <p class="text-gray-400 max-w-xl font-light leading-relaxed">Proprietary financial assets and technical documentation. Trending items are identified by internal node traffic.</p>
        </header>

        <div id="vaultGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-10">
            <div class="col-span-full text-center py-20 opacity-30 font-bold uppercase tracking-widest animate-pulse">Establishing Node Connection...</div>
        </div>
    </main>

    <div id="pdfOverlay" class="fixed inset-0 z-[100] hidden flex flex-col md:flex-row modal-blur">
        <div class="w-full md:w-1/3 p-12 flex flex-col justify-between border-r border-white/5">
            <div>
                <button onclick="closeViewer()" class="text-gray-500 hover:text-white mb-12 flex items-center gap-2 text-[10px] font-black uppercase tracking-widest">
                    <i data-lucide="arrow-left" class="w-4 h-4"></i> Back to Vault
                </button>
                <div id="viewSalary" class="text-orange-500 font-bold text-[10px] uppercase tracking-[0.3em] mb-3"></div>
                <h2 id="viewTitle" class="text-4xl font-extrabold text-white uppercase leading-none mb-6"></h2>
                <p id="viewDesc" class="text-gray-400 leading-relaxed font-light mb-8"></p>
            </div>
            
            <div class="space-y-4">
                <a id="viewDownload" href="#" target="_blank" class="w-full bg-sky-400 text-black py-5 rounded-2xl text-center font-black text-[11px] uppercase hover:bg-white transition-all block">Download Asset</a>
                <p class="text-[9px] text-gray-600 text-center uppercase tracking-widest font-bold">End-to-End Encrypted Transfer</p>
            </div>
        </div>
        
        <div class="flex-grow p-4 md:p-8 bg-black/20">
            <iframe id="viewFrame" src="" class="w-full h-full rounded-[2rem] border border-white/10 shadow-2xl"></iframe>
        </div>
    </div>

    <script>
        let vaultData = [];

        // Fetch data from Google Sheets
        function init() {
            google.script.run.withSuccessHandler(data => {
                vaultData = data;
                document.getElementById('connection-dot').classList.replace('bg-red-500', 'bg-green-500');
                render();
            }).getVaultData();
        }

        function render() {
            const grid = document.getElementById('vaultGrid');
            // Find the maximum download count to mark the "Trending" card
            const maxDls = Math.max(...vaultData.map(d => parseInt(d.downloads || 0)));

            grid.innerHTML = vaultData.map(doc => {
                const isTrending = parseInt(doc.downloads) === maxDls && maxDls > 0;
                
                return `
                <div class="doc-card p-10 flex flex-col ${isTrending ? 'is-trending' : ''}">
                    ${isTrending ? '<div class="absolute top-0 right-0 trending-badge px-5 py-2 text-[9px] font-black uppercase text-white tracking-widest rounded-bl-2xl">Most Downloaded</div>' : ''}
                    
                    <div class="w-12 h-12 bg-sky-400/10 rounded-2xl flex items-center justify-center text-sky-400 mb-8">
                        <i data-lucide="file-text"></i>
                    </div>

                    <span class="text-[10px] text-orange-500 font-black uppercase tracking-[0.2em] mb-3">${doc.salary}</span>
                    <h2 class="text-2xl font-extrabold text-white mb-4 uppercase tracking-tighter leading-tight">${doc.title}</h2>
                    <p class="text-gray-500 text-sm mb-10 line-clamp-3 font-medium">${doc.description}</p>
                    
                    <button onclick="openViewer('${doc.id}')" class="mt-auto w-full border border-white/10 py-4 rounded-2xl text-[10px] font-black uppercase hover:bg-sky-400 hover:text-black transition-all tracking-widest">
                        View Protocol
                    </button>
                </div>`;
            }).join('');
            lucide.createIcons();
        }

        function openViewer(id) {
            const doc = vaultData.find(d => d.id == id);
            if (!doc) return;

            document.getElementById('viewTitle').innerText = doc.title;
            document.getElementById('viewDesc').innerText = doc.description;
            document.getElementById('viewSalary').innerText = doc.salary;
            
            // Clean Google Drive link for preview mode
            const previewUrl = doc.pdflink.replace('/view', '/preview').replace('?usp=sharing', '');
            document.getElementById('viewFrame').src = previewUrl;
            document.getElementById('viewDownload').href = doc.pdflink;
            
            document.getElementById('pdfOverlay').classList.remove('hidden');
            document.body.style.overflow = 'hidden'; // Stop scrolling
        }

        function closeViewer() {
            document.getElementById('pdfOverlay').classList.add('hidden');
            document.getElementById('viewFrame').src = "";
            document.body.style.overflow = 'auto'; // Re-enable scrolling
        }

        window.onload = init;
    </script>
</body>
</html>
