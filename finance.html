<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background: #0f172a; color: white; font-family: sans-serif; padding: 20px; }
    .tab { cursor: pointer; padding: 10px; border-bottom: 2px solid transparent; transition: 0.3s; font-size: 12px; font-weight: bold; }
    .active-tab { border-color: #f97316; color: #f97316; }
    input, textarea { width: 100%; background: #1e293b; border: 1px solid #334155; color: white; padding: 10px; margin-top: 5px; border-radius: 8px; font-size: 13px; }
    button { width: 100%; background: #f97316; color: white; padding: 12px; border-radius: 8px; font-weight: bold; margin-top: 15px; cursor: pointer; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    #status { margin-top: 15px; font-size: 12px; text-align: center; }
  </style>
</head>
<body>

  <div class="flex justify-around mb-6 border-b border-slate-700">
    <div id="tabJob" class="tab active-tab uppercase" onclick="switchTab('job')">Post Job</div>
    <div id="tabFinance" class="tab uppercase" onclick="switchTab('finance')">Upload Finance</div>
  </div>

  <div id="jobForm">
    <label class="text-[10px] text-slate-400 uppercase font-bold">Paste Job Details</label>
    <textarea id="jobText" rows="10" placeholder="Line 1: Title&#10;Line 2: Location&#10;Line 3+: Description"></textarea>
    <button id="jobBtn" onclick="submitJob()">Publish Job</button>
  </div>

  <div id="financeForm" class="hidden">
    <label class="text-[10px] text-slate-400 uppercase font-bold">Document Title</label>
    <input type="text" id="finTitle" placeholder="e.g. Weekly Strategy">
    
    <label class="text-[10px] text-slate-400 uppercase font-bold mt-4 block">Short Description</label>
    <textarea id="finDesc" rows="3" placeholder="Brief summary..."></textarea>
    
    <label class="text-[10px] text-slate-400 uppercase font-bold mt-4 block">Select PDF</label>
    <input type="file" id="finFile" accept="application/pdf">
    
    <button id="finBtn" onclick="submitFinance()">Upload to Vault</button>
  </div>

  <div id="status"></div>

  <script>
    function switchTab(type) {
      document.getElementById('jobForm').classList.toggle('hidden', type !== 'job');
      document.getElementById('financeForm').classList.toggle('hidden', type !== 'finance');
      document.getElementById('tabJob').classList.toggle('active-tab', type === 'job');
      document.getElementById('tabFinance').classList.toggle('active-tab', type === 'finance');
    }

    function setStatus(msg) { document.getElementById('status').innerText = msg; }

    function submitJob() {
      const text = document.getElementById('jobText').value;
      if(!text) return alert("Paste text first");
      document.getElementById('jobBtn').disabled = true;
      setStatus("⏳ Publishing Job...");
      google.script.run.withSuccessHandler((res) => {
        setStatus(res);
        document.getElementById('jobText').value = "";
        document.getElementById('jobBtn').disabled = false;
      }).processRawEntry(text);
    }

    function submitFinance() {
      const fileInput = document.getElementById('finFile');
      const title = document.getElementById('finTitle').value;
      const desc = document.getElementById('finDesc').value;
      
      if(!fileInput.files[0] || !title) return alert("Title and File required");
      
      const file = fileInput.files[0];
      const reader = new FileReader();
      
      document.getElementById('finBtn').disabled = true;
      setStatus("⏳ Converting & Uploading...");

      reader.onload = function(e) {
        google.script.run.withSuccessHandler((res) => {
          setStatus(res);
          document.getElementById('finTitle').value = "";
          document.getElementById('finDesc').value = "";
          document.getElementById('finFile').value = "";
          document.getElementById('finBtn').disabled = false;
        }).uploadFileToDrive(e.target.result, file.name, title, desc);
      };
      reader.readAsDataURL(file);
    }
  </script>
</body>
</html>
