<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KENFLIX | FINANCE VAULT</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Plus+Jakarta+Sans:wght@400;800&display=swap" rel="stylesheet">
    <style>
        :root { --terminal-dark: #020617; --accent-blue: #38bdf8; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--terminal-dark); color: #f1f5f9; margin: 0; }
        .mono { font-family: 'JetBrains Mono', monospace; }
        .fin-card {
            background: linear-gradient(180deg, rgba(30, 41, 59, 0.4) 0%, rgba(15, 23, 42, 0) 100%);
            border: 1px solid rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
            transition: all 0.3s ease;
        }
        .fin-card:hover { border-color: var(--accent-blue); background: rgba(30, 41, 59, 0.6); }
        .viewer-overlay { backdrop-filter: blur(40px); background: rgba(2, 6, 23, 0.98); }
    </style>
</head>
<body class="min-h-screen">

    <nav class="p-6 border-b border-white/5 flex justify-between items-center bg-slate-950/50 backdrop-blur-md sticky top-0 z-50">
        <h1 class="text-white font-black text-xl tracking-tighter uppercase">Kenflix<span class="text-sky-400">Finance</span></h1>
        <div id="status" class="px-4 py-1 border border-red-500/30 rounded text-red-500 text-[10px] mono uppercase">Status: Disconnected</div>
    </nav>

    <main class="container mx-auto px-6 py-12">
        <div class="mb-12 border-l-4 border-sky-500 pl-6">
            <h1 class="text-5xl font-black text-white uppercase tracking-tighter">Finance <span class="text-gray-500">Vault</span></h1>
            <button onclick="location.reload()" class="mt-4 text-[10px] mono text-sky-400 hover:text-white uppercase tracking-widest flex items-center gap-2">
                <i data-lucide="refresh-cw" class="w-3 h-3"></i> Force Node Sync
            </button>
        </div>

        <div id="vaultGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <div id="loader" class="col-span-full py-20 text-center mono text-gray-600 animate-pulse">Establishing Secure Data Handshake...</div>
        </div>
    </main>

    <div id="pdfOverlay" class="fixed inset-0 z-[100] hidden flex flex-col md:flex-row viewer-overlay">
        <div class="w-full md:w-1/3 p-12 flex flex-col justify-between border-r border-white/10">
            <div>
                <button onclick="closeViewer()" class="text-gray-500 hover:text-sky-400 mb-8 flex items-center gap-2 text-[10px] mono font-bold uppercase tracking-widest">
                    <i data-lucide="arrow-left" class="w-4 h-4"></i> Exit
                </button>
                <div id="vSalary" class="inline-block bg-sky-500/10 text-sky-400 px-2 py-1 rounded text-[10px] mono mb-4 uppercase"></div>
                <h2 id="vTitle" class="text-4xl font-black text-white uppercase leading-none mb-6"></h2>
                <p id="vDesc" class="text-gray-400 text-sm italic font-light"></p>
            </div>
            <a id="vDl" href="#" target="_blank" class="w-full bg-white text-black py-4 rounded-xl text-center font-black text-[10px] uppercase hover:bg-sky-400 transition-all">Download Report</a>
        </div>
        <div class="flex-grow p-4 md:p-8 bg-black">
            <iframe id="vFrame" src="" class="w-full h-full rounded-xl shadow-2xl border border-white/5 bg-slate-900"></iframe>
        </div>
    </div>

    <script>
        const SCRIPT_ID = "AKfycbze0Lxq9jsLsLTFg1Lma9L9oADYS1ubZp4f0PmsX2B32dLNGXzCpcX_9CSpRcB8EeIZrA";
        let vaultData = [];

        function handleResponse(data) {
            console.log("Data Received:", data);
            if (!data || data.length === 0) {
                document.getElementById('vaultGrid').innerHTML = `<div class="col-span-full text-center py-20 text-orange-500 mono">NO_RECORDS_FOUND: Verify your sheet tab is named 'FinanceVault'</div>`;
                return;
            }
            vaultData = data;
            document.getElementById('status').innerText = "Status: Synchronized";
            document.getElementById('status').classList.replace('border-red-500/30', 'border-green-500/30');
            document.getElementById('status').classList.replace('text-red-500', 'text-green-500');
            render();
        }

        function init() {
            const script = document.createElement('script');
            script.src = `https://script.google.com/macros/s/${SCRIPT_ID}/exec?callback=handleResponse`;
            document.body.appendChild(script);
        }

        function render() {
            const grid = document.getElementById('vaultGrid');
            grid.innerHTML = vaultData.map(doc => `
                <div class="fin-card p-8 flex flex-col rounded-2xl relative">
                    <div class="flex justify-between items-start mb-6 text-gray-600">
                        <i data-lucide="shield" class="w-5 h-5"></i>
                        <span class="mono text-[10px]">${doc.id}</span>
                    </div>
                    <span class="mono text-[9px] text-sky-400 font-bold uppercase tracking-widest mb-2">${doc.salary}</span>
                    <h2 class="text-xl font-black text-white mb-4 uppercase tracking-tighter">${doc.title}</h2>
                    <p class="text-gray-500 text-xs mb-8 line-clamp-2 leading-relaxed">${doc.description}</p>
                    <div class="mt-auto pt-6 border-t border-white/5">
                        <button onclick="openViewer('${doc.id}')" class="text-[10px] mono font-bold text-sky-400 hover:text-white uppercase tracking-widest transition-colors">Access File</button>
                    </div>
                </div>`).join('');
            lucide.createIcons();
        }

        function openViewer(id) {
            const doc = vaultData.find(d => d.id == id);
            document.getElementById('vTitle').innerText = doc.title;
            document.getElementById('vDesc').innerText = doc.description;
            document.getElementById('vSalary').innerText = doc.salary;
            document.getElementById('vFrame').src = doc.pdflink.replace('/view', '/preview');
            document.getElementById('vDl').href = doc.pdflink;
            document.getElementById('pdfOverlay').classList.remove('hidden');
            document.body.style.overflow = 'hidden';
        }

        function closeViewer() {
            document.getElementById('pdfOverlay').classList.add('hidden');
            document.getElementById('vFrame').src = "";
            document.body.style.overflow = 'auto';
        }

        window.onload = init;
    </script>
</body>
</html>
