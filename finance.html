<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kenflix | Premium Finance Vault</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;700&family=Inter:wght@400;900&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #0ea5e9; --bg: #020617; }
        body { 
            background-color: var(--bg); 
            color: #f8fafc; 
            font-family: 'Inter', sans-serif;
            background-image: radial-gradient(circle at 50% -20%, #1e293b 0%, #020617 80%);
            margin: 0;
        }
        .glass-card {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .glass-card:hover {
            border-color: var(--accent);
            transform: translateY(-5px);
            box-shadow: 0 10px 30px -10px rgba(14, 165, 233, 0.3);
        }
        .status-dot {
            height: 8px; width: 8px; border-radius: 50%;
            display: inline-block; background: #22c55e;
            box-shadow: 0 0 10px #22c55e;
            animation: pulse 2s infinite;
        }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }
        .data-label { font-family: 'Space Grotesk', sans-serif; text-transform: uppercase; letter-spacing: 0.1em; font-size: 0.65rem; color: #64748b; }
        
        /* Custom Scrollbar for the PDF Sidebar */
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-track { background: transparent; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
    </style>
</head>
<body class="min-h-screen">

<header class="border-b border-white/5 py-4 px-8 flex justify-between items-center sticky top-0 bg-slate-950/80 backdrop-blur-md z-50">
    <div class="flex items-center gap-4">
        <div class="status-dot"></div>
        <span class="data-label text-white">System: Operational</span>
    </div>
    <div class="flex items-center gap-2">
        <i data-lucide="shield-check" class="w-4 h-4 text-sky-400"></i>
        <span class="text-[10px] font-bold tracking-widest uppercase">Kenflix Encryption Active</span>
    </div>
</header>

<main class="max-w-7xl mx-auto p-8">
    <div class="flex flex-col md:flex-row justify-between items-end mb-12 gap-6">
        <div>
            <h1 class="text-5xl md:text-6xl font-black tracking-tighter mb-2 italic uppercase">Finance <span class="text-sky-500">Vault</span></h1>
            <p class="text-slate-400 max-w-md text-sm border-l-2 border-sky-500 pl-4">Proprietary financial analysis and internal asset records. Strictly Confidential.</p>
        </div>
        <div class="bg-slate-900/50 p-4 border border-white/5 rounded-2xl flex gap-8">
            <div class="text-right">
                <p class="data-label">USD / KES</p>
                <p id="fx-rate" class="font-bold text-xl italic text-white">128.50</p>
            </div>
            <div class="text-right">
                <p class="data-label">Vault ID</p>
                <p class="font-bold text-xl text-sky-400 italic">FX-NODE</p>
            </div>
        </div>
    </div>

    <div id="vaultGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
        <div class="glass-card p-10 rounded-3xl animate-pulse h-64 bg-slate-800/20"></div>
        <div class="glass-card p-10 rounded-3xl animate-pulse h-64 bg-slate-800/20"></div>
        <div class="glass-card p-10 rounded-3xl animate-pulse h-64 bg-slate-800/20"></div>
    </div>
</main>

<div id="pdfOverlay" class="fixed inset-0 hidden z-[100] bg-slate-950 flex flex-col">
    <nav class="p-4 border-b border-white/10 flex justify-between items-center bg-slate-900">
        <div class="flex items-center gap-4">
            <button onclick="closeViewer()" class="p-2 hover:bg-white/5 rounded-full transition-colors">
                <i data-lucide="arrow-left" class="text-slate-400"></i>
            </button>
            <div>
                <h3 id="vTitle" class="font-bold text-sm tracking-tight uppercase text-white leading-none mb-1">Document Viewer</h3>
                <p id="vMeta" class="text-[9px] text-sky-500 font-mono uppercase tracking-widest"></p>
            </div>
        </div>
        <div class="flex items-center gap-4">
             <p id="vOverlayDesc" class="hidden lg:block text-[11px] text-slate-500 italic max-w-xs truncate"></p>
             <a id="vDl" href="#" target="_blank" class="bg-white text-black hover:bg-sky-400 hover:text-white px-6 py-2 rounded-xl text-[10px] font-black uppercase tracking-widest transition-all flex items-center gap-2">
                <i data-lucide="download" class="w-3 h-3"></i> Save File
             </a>
        </div>
    </nav>
    <div class="flex-1 bg-slate-950 overflow-hidden relative">
        <iframe id="vFrame" class="w-full h-full border-none shadow-2xl" allow="autoplay"></iframe>
    </div>
</div>

<script>
    // --- CONFIGURATION ---
    const SCRIPT_ID = "AKfycbxWpMOJ9sBvcxuV4FXuZaJ1OuvPzIL2BPealurN8U_QJe18dU3yL2AgTxmutJ1dagHo0w";
    let vaultData = [];

    // --- DATA FETCHING ---
    function handleResponse(data) {
        vaultData = data;
        renderVault(data);
    }

    function init() {
        const script = document.createElement('script');
        script.src = `https://script.google.com/macros/s/${SCRIPT_ID}/exec?callback=handleResponse`;
        document.body.appendChild(script);
        fetchFX();
    }

    async function fetchFX() {
        try {
            const res = await fetch('https://open.er-api.com/v6/latest/USD');
            const data = await res.json();
            document.getElementById('fx-rate').innerText = data.rates.KES.toFixed(2);
        } catch(e) { console.warn("FX Sync Delayed"); }
    }

    // --- RENDER INTERFACE ---
    function renderVault(docs) {
        const grid = document.getElementById('vaultGrid');
        if (!docs || docs.length === 0) {
            grid.innerHTML = '<div class="col-span-full text-center py-20 bg-slate-900/50 rounded-3xl border border-dashed border-white/10 italic text-slate-500">Node Empty: No data detected in Finance Sheet.</div>';
            return;
        }

        grid.innerHTML = docs.map(doc => {
            // Flexible link handling (works if column is 'link' or 'pdflink')
            const fileLink = doc.link || doc.pdflink || "#";
            
            return `
            <div class="glass-card p-8 rounded-[2.5rem] flex flex-col justify-between group">
                <div>
                    <div class="flex justify-between items-start mb-8">
                        <div class="bg-sky-500/10 p-4 rounded-2xl text-sky-400 group-hover:bg-sky-500 group-hover:text-white transition-all">
                            <i data-lucide="file-text" class="w-6 h-6"></i>
                        </div>
                        <span class="data-label text-slate-600">${doc.type || 'ASSET'}</span>
                    </div>
                    <p class="data-label text-sky-500/40 mb-2 font-mono">${doc.id || 'NO-REF'}</p>
                    <h2 class="text-xl font-bold leading-tight mb-4 text-white">${doc.title || 'Unknown Asset'}</h2>
                    <p class="text-slate-500 text-xs line-clamp-2 leading-relaxed mb-8 italic">${doc.description || 'Secure encrypted technical asset.'}</p>
                </div>
                
                <div class="grid grid-cols-2 gap-3 pt-6 border-t border-white/5">
                    <button onclick="openViewer('${doc.id}')" class="bg-sky-500 text-white py-3.5 rounded-2xl text-[10px] font-black uppercase tracking-widest hover:bg-sky-400 transition-all flex items-center justify-center gap-2">
                        <i data-lucide="eye" class="w-4 h-4"></i> Read Online
                    </button>
                    <a href="${fileLink}" target="_blank" class="bg-white/5 hover:bg-white/10 text-white py-3.5 rounded-2xl text-[10px] font-black uppercase tracking-widest transition-all flex items-center justify-center gap-2 border border-white/5">
                        <i data-lucide="download" class="w-4 h-4 text-slate-400"></i> Download
                    </a>
                </div>
            </div>
        `}).join('');
        lucide.createIcons();
    }

    // --- OVERLAY LOGIC ---
    function openViewer(id) {
        const doc = vaultData.find(d => d.id == id);
        if (!doc) return;

        const fileLink = doc.link || doc.pdflink || "";
        let fileId = "";

        // Smart Extraction of Google Drive ID
        if (fileLink.includes("id=")) {
            fileId = fileLink.split("id=")[1].split("&")[0];
        } else if (fileLink.includes("/d/")) {
            fileId = fileLink.split("/d/")[1].split("/")[0];
        }

        // The logic for Google Drive Iframe compatibility
        const previewUrl = fileId ? `https://drive.google.com/file/d/${fileId}/preview` : fileLink;
        
        document.getElementById("vTitle").innerText = doc.title;
        document.getElementById("vMeta").innerText = `NODE: ${doc.id} | FORMAT: ${doc.type || 'PDF'}`;
        document.getElementById("vOverlayDesc").innerText = doc.description;
        document.getElementById("vFrame").src = previewUrl;
        document.getElementById("vDl").href = fileLink;
        
        document.getElementById("pdfOverlay").classList.remove("hidden");
        document.body.style.overflow = "hidden"; // Stop scrolling background
    }

    function closeViewer() {
        document.getElementById("pdfOverlay").classList.add("hidden");
        document.getElementById("vFrame").src = ""; // Stop PDF audio/loading
        document.body.style.overflow = "auto";
    }

    // Launch!
    window.onload = init;
</script>

</body>
</html>
